name: Setup And Deploy Infra

on:
  workflow_dispatch:
    inputs:
      server_host:
        description: Server Hostname or IP Address
        required: false
        type: string
      deploy_root:
        description: Deployment root directory
        required: true
        type: string
      service_domain:
        description: Comma-separated base domains for Wildcard SSL (e.g. example.com, example.net)
        required: true
        type: string
      acme_email:
        description: Email for Traefik ACME (defaults to GitHub email if empty)
        required: false
        type: string
      traefik_user:
        description: Traefik Dashboard Username (optional)
        required: false
        type: string
      traefik_password:
        description: Traefik Dashboard Password (optional)
        required: false
        type: string
      traefik_dashboard_host:
        description: Traefik Dashboard Hostname (e.g. traefik.example.com)
        required: false
        type: string
      setup_redis:
        description: Deploy Redis
        required: true
        default: true
        type: boolean
      redis_password:
        description: Redis Password
        required: false
        type: string
      redis_bind_address:
        description: Redis Bind Address (default 0.0.0.0)
        required: false
        type: string
      setup_mysql:
        description: Bootstrap and Deploy MySQL
        required: true
        default: true
        type: boolean
      mysql_root_password:
        description: MySQL Root Password
        required: false
        type: string
      mysql_bind_address:
        description: MySQL Bind Address (default 0.0.0.0)
        required: false
        type: string
      setup_rabbitmq:
        description: Bootstrap and Deploy RabbitMQ
        required: true
        default: true
        type: boolean
      rabbitmq_username:
        description: RabbitMQ Username
        required: true
        type: string
      rabbitmq_password:
        description: RabbitMQ User Password
        required: false
        type: string
      rabbitmq_management_host:
        description: RabbitMQ Management Hostname (e.g. rabbitmq.example.com)
        required: false
        type: string
      

jobs:
  setup-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    env:
      HOST: ${{ github.event.inputs.server_host || secrets.SERVER_HOST }}
      USER: ${{ secrets.SERVER_USER }}
      PORT: ${{ secrets.SERVER_PORT || '22' }}
      DEPLOY_ROOT: ${{ github.event.inputs.deploy_root || '/opt/saas' }}
      CF_DNS_API_TOKEN: ${{ secrets.CF_DNS_API_TOKEN }}
      CF_ZONE_API_TOKEN: ${{ secrets.CF_ZONE_API_TOKEN }}
      MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE || 'authorization' }}
      MYSQL_BIND_ADDRESS: ${{ github.event.inputs.mysql_bind_address || vars.MYSQL_BIND_ADDRESS || '0.0.0.0' }}
      MYSQL_PORT: ${{ vars.MYSQL_PORT || '3306' }}
      RABBITMQ_USERNAME: ${{ github.event.inputs.rabbitmq_username || secrets.RABBITMQ_USERNAME || 'saas' }}
      RABBITMQ_ERLANG_COOKIE: ${{ secrets.RABBITMQ_ERLANG_COOKIE }}
      RABBITMQ_DEFAULT_VHOST: ${{ vars.RABBITMQ_DEFAULT_VHOST || 'Account' }}
      RABBITMQ_AMQP_BIND: ${{ vars.RABBITMQ_AMQP_BIND || '0.0.0.0:5672' }}
      RABBITMQ_MANAGEMENT_HOST: ${{ github.event.inputs.rabbitmq_management_host || secrets.RABBITMQ_MANAGEMENT_HOST || format('rabbitmq.{0}', github.event.inputs.service_domain || vars.SERVICE_DOMAIN || 'autoleaze.com') }}
      REDIS_PASSWORD: ${{ github.event.inputs.redis_password || secrets.REDIS_PASSWORD }}
      REDIS_BIND_ADDRESS: ${{ github.event.inputs.redis_bind_address || vars.REDIS_BIND_ADDRESS || '0.0.0.0' }}
      REDIS_PORT: ${{ vars.REDIS_PORT || '6379' }}
      REDIS_MAXMEMORY: ${{ vars.REDIS_MAXMEMORY || '512mb' }}
      REDIS_MAXMEMORY_POLICY: ${{ vars.REDIS_MAXMEMORY_POLICY || 'allkeys-lru' }}
      SERVICE_DOMAIN: ${{ github.event.inputs.service_domain || vars.SERVICE_DOMAIN || 'autoleaze.com' }}
      MYSQL_ROOT_PASSWORD: ${{ github.event.inputs.mysql_root_password || secrets.MYSQL_ROOT_PASSWORD }}
      RABBITMQ_PASSWORD: ${{ github.event.inputs.rabbitmq_password || secrets.RABBITMQ_PASSWORD }}
      DOCKER_API_VERSION: '1.40'
      TRAEFIK_PROVIDERS_DOCKER_APIVERSION: '1.40'
      ACME_EMAIL: ${{ github.event.inputs.acme_email || vars.ACME_EMAIL || github.event.pusher.email || github.actor_id && format('{0}@users.noreply.github.com', github.actor) || 'admin@autoleaze.com' }}
      TRAEFIK_USER: ${{ github.event.inputs.traefik_user }}
      TRAEFIK_PASSWORD: ${{ github.event.inputs.traefik_password }}
      TRAEFIK_DASHBOARD_HOST: ${{ github.event.inputs.traefik_dashboard_host || secrets.TRAEFIK_DASHBOARD_HOST || format('traefik.{0}', github.event.inputs.service_domain || vars.SERVICE_DOMAIN || 'autoleaze.com') }}
      TRAEFIK_DASHBOARD_AUTH: ${{ secrets.TRAEFIK_DASHBOARD_AUTH }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          SECRET_PRIVATE_KEY_BASE64: ${{ secrets.BOOTSTRAP_SSH_PRIVATE_KEY_BASE64 }}
          SECRET_PRIVATE_KEY: ${{ secrets.BOOTSTRAP_SSH_PRIVATE_KEY }}
        run: |
          bash scripts/configure-ssh-key.sh

      - name: Validate Service Credentials
        run: |
          if [ "${{ github.event.inputs.setup_mysql }}" = "true" ] && [ -z "${{ github.event.inputs.mysql_root_password }}" ]; then
            echo "::error::MySQL is enabled but mysql_root_password is missing." && exit 1
          fi
          if [ "${{ github.event.inputs.setup_rabbitmq }}" = "true" ]; then
            if [ -z "${{ github.event.inputs.rabbitmq_username }}" ] || [ -z "${{ github.event.inputs.rabbitmq_password }}" ]; then
              echo "::error::RabbitMQ is enabled but username or password is missing." && exit 1
            fi
          fi
          if [ "${{ github.event.inputs.setup_redis }}" = "true" ] && [ -z "${{ github.event.inputs.redis_password }}" ]; then
            echo "::error::Redis is enabled but redis_password is missing." && exit 1
          fi

      - name: Prepare server
        env:
          INSTALL_DOCKER: 'true'
        run: |
          chmod +x scripts/bootstrap-server.sh
          ssh -i ~/.ssh/bootstrap_key -p "$PORT" -o StrictHostKeyChecking=no "$USER@$HOST" "mkdir -p /tmp/saas-server-setup"
          scp -i ~/.ssh/bootstrap_key -P "$PORT" -o StrictHostKeyChecking=no \
            scripts/bootstrap-server.sh \
            "$USER@$HOST:/tmp/saas-server-setup/"
          ssh -i ~/.ssh/bootstrap_key -p "$PORT" -o StrictHostKeyChecking=no "$USER@$HOST" "
            sudo DEPLOY_ROOT='$DEPLOY_ROOT' \
              INSTALL_DOCKER='$INSTALL_DOCKER' \
              SETUP_NGINX=true \
              SETUP_MYSQL='${{ github.event.inputs.setup_mysql || 'true' }}' \
              SETUP_RABBITMQ='${{ github.event.inputs.setup_rabbitmq || 'true' }}' \
              SETUP_REDIS='${{ github.event.inputs.setup_redis || 'true' }}' \
              SETUP_SERVICES=true \
              bash /tmp/saas-server-setup/bootstrap-server.sh
          "

      - name: Generate Traefik Auth
        run: |
          if [ -n "$TRAEFIK_USER" ] && [ -n "$TRAEFIK_PASSWORD" ]; then
            echo "Generating Traefik Auth for user: $TRAEFIK_USER"
            # Using Python to generate SHA1 hash for Traefik basic auth
            HASH=$(python3 -c "import hashlib, base64; print(base64.b64encode(hashlib.sha1(\"$TRAEFIK_PASSWORD\".encode()).digest()).decode())")
            echo "TRAEFIK_DASHBOARD_AUTH=$TRAEFIK_USER:{SHA}$HASH" >> $GITHUB_ENV
          elif [ -z "$TRAEFIK_DASHBOARD_AUTH" ]; then
            echo "Warning: No Traefik credentials provided. Dashboard might be unprotected or inaccessible."
          fi

      - name: Render infra environment
        run: |
          cp -R infra rendered-infra
          python3 - <<'PY'
          import os
          from pathlib import Path

          keys = [
              "ACME_EMAIL", "CF_DNS_API_TOKEN", "CF_ZONE_API_TOKEN",
              "MYSQL_ROOT_PASSWORD",
              "MYSQL_DATABASE", "MYSQL_BIND_ADDRESS", "MYSQL_PORT",
              "RABBITMQ_USERNAME", "RABBITMQ_PASSWORD", "RABBITMQ_ERLANG_COOKIE",
              "RABBITMQ_DEFAULT_VHOST", "RABBITMQ_AMQP_BIND",
              "REDIS_PASSWORD", "REDIS_BIND_ADDRESS", "REDIS_PORT",
              "REDIS_MAXMEMORY", "REDIS_MAXMEMORY_POLICY",
              "SERVICE_DOMAIN", "DOCKER_API_VERSION",
              "TRAEFIK_DASHBOARD_AUTH", "TRAEFIK_PROVIDERS_DOCKER_APIVERSION",
              "TRAEFIK_DASHBOARD_HOST", "RABBITMQ_MANAGEMENT_HOST",
          ]
          with Path("rendered-infra/.env").open("w") as fh:
              for key in keys:
                  value = os.environ.get(key) or ""
                  # Escape $ with $$$$ to survive double interpolation in Docker Compose
                  value = value.replace('$', '$$$$')
                  fh.write(f"{key}={value}\n")

          definitions = Path("rendered-infra/rabbitmq/definitions.json")
          content = definitions.read_text()
          user = os.environ.get("RABBITMQ_USERNAME") or "saas"
          pw = os.environ.get("RABBITMQ_PASSWORD") or ""
          content = content.replace("${RABBITMQ_USERNAME}", user)
          content = content.replace("${RABBITMQ_PASSWORD}", pw)
          definitions.write_text(content)

          traefik_cfg = Path("rendered-infra/traefik/traefik.yml")
          if traefik_cfg.exists():
              content = traefik_cfg.read_text()
              content = content.replace("${SERVICE_DOMAIN}", os.environ.get("SERVICE_DOMAIN") or "")
              content = content.replace("${ACME_EMAIL}", os.environ.get("ACME_EMAIL") or "")
              traefik_cfg.write_text(content)
          PY

      - name: Deploy infra
        run: |
          ssh -i ~/.ssh/bootstrap_key -p "$PORT" -o StrictHostKeyChecking=no "$USER@$HOST" "rm -rf '$DEPLOY_ROOT/infra' && mkdir -p '$DEPLOY_ROOT/infra'"
          echo "DEBUG: Content of local docker-compose.yml (first 10 lines):"
          head -n 10 rendered-infra/docker-compose.yml
          
          rsync -az --delete -v -e "ssh -i ~/.ssh/bootstrap_key -p $PORT -o StrictHostKeyChecking=no" \
            rendered-infra/ "$USER@$HOST:$DEPLOY_ROOT/infra/"
          
          echo "DEBUG: Content of remote docker-compose.yml (first 10 lines):"
          ssh -i ~/.ssh/bootstrap_key -p "$PORT" -o StrictHostKeyChecking=no "$USER@$HOST" "head -n 10 '$DEPLOY_ROOT/infra/docker-compose.yml'"
          
          echo "DEBUG: Current Traefik image on server:"
          ssh -i ~/.ssh/bootstrap_key -p "$PORT" -o StrictHostKeyChecking=no "$USER@$HOST" "docker inspect traefik --format '{{.Config.Image}}' || echo 'Not found'"
          
          ssh -i ~/.ssh/bootstrap_key -p "$PORT" -o StrictHostKeyChecking=no "$USER@$HOST" bash <<EOF
            set -e
            docker network inspect public >/dev/null 2>&1 || docker network create public
            cd '$DEPLOY_ROOT/infra'
            
            PROFILES=""
            if [ "${{ github.event.inputs.setup_mysql || 'true' }}" = "true" ]; then PROFILES="\$PROFILES --profile mysql"; fi
            if [ "${{ github.event.inputs.setup_rabbitmq || 'true' }}" = "true" ]; then PROFILES="\$PROFILES --profile rabbitmq"; fi
            if [ "${{ github.event.inputs.setup_redis || 'true' }}" = "true" ]; then PROFILES="\$PROFILES --profile redis"; fi
            
            echo "Deploying with profiles: \$PROFILES (forcing pull)"
            docker compose \$PROFILES pull
            docker compose \$PROFILES up -d --remove-orphans --force-recreate
            docker compose \$PROFILES ps
          EOF
