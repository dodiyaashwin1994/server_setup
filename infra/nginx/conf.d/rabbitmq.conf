server {
    listen 443 ssl;
    server_name rabbitmq.autoleaze.com; # This should be replaced or made dynamic

    ssl_certificate /etc/letsencrypt/live/autoleaze.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autoleaze.com/privkey.pem;

    location / {
        proxy_pass http://rabbitmq:15672;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
