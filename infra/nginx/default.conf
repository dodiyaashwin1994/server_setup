server {
    listen 80;
    server_name _;
    
    # ACME Challenge for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _; # Catch-all for SSL to allow snippet-based routing

    # Note: These paths will be correct once Certbot has issued the certificates
    # You may need to manually update the domain name in these paths if you change SERVICE_DOMAIN
    ssl_certificate /etc/letsencrypt/live/autoleze.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autoleze.com/privkey.pem;

    # SSL optimizations
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Include all location snippets managed by services
    include /etc/nginx/conf.d/locations/*.inc;

    # Default location (Frontend)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
